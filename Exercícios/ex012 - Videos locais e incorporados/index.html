<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<body>
    
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor.</p>

    <video width="500" poster="imagens/thumb.png" controls><!--Poster é a thumb do vídeo-->
        <source src="midia/video-720-mp4.mp4" type="video/mp4">
        <source src="midia/video-720-mp4.mvk" type="video/mp4">
        <source src="midia/video-720-mp4.webm" type="video/webm">
        <source src="midia/video-720-mp4.ogv" type="video/ogg">
        <p>Seu navegador não tem compatibilidade com reprodução de vídeos.</p>
    </video>

    <!--<video src="midia/video-720-mp4.webm" width="500" controls></video>-->

    <h1>Inserindo vídeos do Youtube</h1>
    <iframe width="751" height="480" src="https://www.youtube.com/embed/3hng-hmSv2Y?list=PLHz_AreHm4dkZ9-atkcmcBaMZdmLHft8n" title="Incorporação de vídeos externos - @Curso em Vídeo HTML5 e CSS3" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>

    <h1>Inserindo vídeos do Vimeo</h1>
