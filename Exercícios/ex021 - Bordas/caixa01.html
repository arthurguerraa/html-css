<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>

    <style>
        h1{ /*box-level*/

            /*display: inline; - transforma o box-level em inline-level*/
            background-color: lightgray;
            height: 300px;
            width: 300px;

            border-width: 10px;
            border-style: solid;
            border-color: darkgray;
            /*border: 10px solid darkgray - shorthand é a simplificação dos valores do elemento em uma só linha*/

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            /*padding: 10px 10px 10px 10px* 
            se as 4 forem iguais pode informar só uma vez o valor da medida
            se informar dois valores o primeiro será o top e bottom e o segundo left e right
            */

           /* margin: auto; centraliza uma caixa*/

            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 30px;
            margin-left: 20px;
            /*margin: 20px 20px 30px 20px*/
            /*margin: 20px 30px auto já centraliza a margin*/

            /*outline é um tracejado dentro da margin*/
            outline-width: 5px;
            outline-style: dashed;
            outline-color: coral;
            /*outline: 5px dashed coral*/

        }

        a{ /*inline-level*/

            /*display: block; - transforma inline-level em box-level*/
            border-width: 10px;
            border-style: solid;
            border-color: red;
            /*border: 10px solid red*/

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            /*padding: 10px 10px 10px 10px*/
        }
    </style>

</head>
<body>
    
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>


</body>
</html>
