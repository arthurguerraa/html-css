<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>

    <style>
       * { /* Configurações globais do CSS */
            height: 100%;
        }

        body{
            background-image: linear-gradient(to right, #545ACE, #723EB9, #B33593, #D94267, #F16A3A, #FECE6B); /* pode usar a direção por graus também, ex: 45deg* e a porcentagem de cada cor que você quer, ex: 10%/
            background-attachment: fixed; /* fundo fixo*/

        }
    </style>

</head>
<body>

    <h1>Testando Gradiente</h1>
    
</body>
</html>
