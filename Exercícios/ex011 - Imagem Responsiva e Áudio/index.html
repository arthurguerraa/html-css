<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    
    <h1>Imagem Dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminuia o tamanho do seu navegador.</p>

    <picture>
        <source media="(max-width: 750px)" srcset="Imagens/300x300.jpg">
        <source media="(max-width: 1050px)" srcset="Imagens/700x700.jpg">
        <img src="Imagens/1000x1000.jpg" alt="Imagem flexível">
        <!-- Configuração de responsividade da imagem ("a ordem dos source media é sempre do menor pro maior")-->
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir em HTML5</p>
    <audio preload="metadata" autoplay controls loop>
        <source src="midias/hans-zimmer-flight-(man of steel).mp3" type="audio/mpeg">
        <source src="midias/hans-zimmer-flight-(man of steel).mp3" type="audio/ogg">
        <source src="midias/hans-zimmer-flight-(man of steel).mp3" type="audio/wav">
        <p>Infeliz seu navegador não consegue reproduzir áudio. <a href="midias/hans-zimmer-flight-(man of steel).mp3">Clique aqui para baixar o arquivo MP3</a></p>
        <!-- O navegador vai tentar reporudizir os arquivos do primeiro pro último-->
        <!--autoplay é pra começar a tocar sozinho, controls são os controles do áudio e loop é pra ficar tocando em looping-->
        <!-- Evitar o arquivo wav porque é muito pesado-->
        <!-- metadata puxa as informações do arquivo-->
    </audio>
    
    <!--<audio src="midias/hans-zimmer-flight-(man of steel).mp3" controls autoplay></audio>-->
    <!-- MP3 WAV OGG-->

</body>
</html>
