<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.png" type="image/x-icon">
    <title>Imagem Flexível</title>
</head>
<body>
    
    <h1>Imagem Flexível</h1>
    <p>Você está vendo a imagem completa? Experimente ampliar o tamanho da sua janela para aproveitar a melhor experiência</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/300x300.jpg">
        <source media="(max-width: 1050px)" srcset="imagens/700x700.jpg">
        <img src="imagens/1000x1000.jpg" alt="Imagem flexível">
        <!-- Configuração de responsividade da imagem ("a ordem dos source media é sempre do menor pro maior")-->
    </picture>

</body>
</html>
